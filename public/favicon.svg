<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Dark, deep cosmic background gradient -->
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#12131C" />
      <stop offset="100%" stop-color="#050609" />
    </radialGradient>

    <!-- Glowing border gradient -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9C27B0" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#1A1B2F" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.6" />
    </linearGradient>

    <!-- Vibrant Gradient for the Upper S-Loop -->
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E040FF" />
      <stop offset="100%" stop-color="#7C4DFF" />
    </linearGradient>

    <!-- Vibrant Gradient for the Lower S-Loop -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#0083FF" />
    </linearGradient>

    <!-- Electric White-to-Cyan Gradient for the Central Zap -->
    <linearGradient id="zapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>

    <!-- High-quality volumetric glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft drop shadow for dimensional depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Deep rounded obsidian background -->
  <rect width="128" height="128" rx="32" fill="url(#darkBg)" />

  <!-- Premium thin glowing outer frame -->
  <rect width="118" height="118" x="5" y="5" rx="28" fill="none" stroke="url(#borderGlow)" stroke-width="1.5" />

  <!-- Main "S" + Zap Symbol Group -->
  <g filter="url(#shadow)">
    
    <!-- 1. Upper Loop of the "S" (Smooth Purple/Violet Arc) -->
    <path d="M 88,42 
             C 88,28 76,22 62,22 
             C 46,22 38,30 38,44 
             C 38,54 44,58 54,62 
             L 58,54 
             C 50,51 48,48 48,44 
             C 48,36 54,30 62,30 
             C 70,30 76,34 76,42 
             C 76,48 72,52 64,56 
             L 68,64 
             C 78,60 88,52 88,42 Z" 
          fill="url(#violetGrad)" 
          filter="url(#glow)" />

    <!-- 2. Lower Loop of the "S" (Smooth Cyan/Blue Arc) -->
    <path d="M 40,86 
             C 40,100 52,106 66,106 
             C 82,106 90,98 90,84 
             C 90,74 84,70 74,66 
             L 70,74 
             C 78,77 80,80 80,84 
             C 80,92 74,98 66,98 
             C 58,98 52,94 52,86 
             C 52,80 56,76 64,72 
             L 60,64 
             C 50,68 40,76 40,86 Z" 
          fill="url(#cyanGrad)" 
          filter="url(#glow)" />

    <!-- 3. Simple, Sharp Electric Zap (Lightning Bolt) in the center -->
    <path d="M 80,24 
             L 48,68 
             L 68,68 
             L 44,104 
             L 78,60 
             L 58,60 
             Z" 
          fill="url(#zapGrad)" 
          filter="url(#glow)" />

    <!-- 4. Energetic glowing accent sparkles -->
    <circle cx="86" cy="28" r="2.5" fill="#FFFFFF" filter="url(#glow)" />
    <circle cx="42" cy="100" r="2.5" fill="#00F5FF" filter="url(#glow)" opacity="0.8" />
  </g>
</svg>
