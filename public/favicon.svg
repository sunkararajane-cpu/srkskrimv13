<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Dark, deep premium cosmic background gradient -->
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161722" />
      <stop offset="60%" stop-color="#0E0F16" />
      <stop offset="100%" stop-color="#050609" />
    </radialGradient>

    <!-- Glowing outer border gradient -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E040FF" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#1A1B2F" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.7" />
    </linearGradient>

    <!-- Vibrant 3D Violet Gradient for the Upper S-Hook -->
    <linearGradient id="violetGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3B0FF" />
      <stop offset="50%" stop-color="#9C27B0" />
      <stop offset="100%" stop-color="#4A0072" />
    </linearGradient>

    <!-- Vibrant 3D Cyan Gradient for the Lower S-Hook -->
    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="50%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#004D61" />
    </linearGradient>

    <!-- White-to-Cyan Electric Lightning Bolt Core Gradient -->
    <linearGradient id="zapCore" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#9FFFFF" />
      <stop offset="70%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#7B1FA2" />
    </linearGradient>

    <!-- Glowing outline for the Lightning Bolt -->
    <linearGradient id="zapBorder" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#E040FF" />
    </linearGradient>

    <!-- High-quality volumetric glow filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft drop shadow for authentic dimensional depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Delicate background grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#FFFFFF" stroke-opacity="0.015" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- 1. Obsidian rounded squircle container -->
  <rect width="128" height="128" rx="34" fill="url(#darkBg)" />
  <rect width="128" height="128" rx="34" fill="url(#grid)" />

  <!-- 2. Concentric tech dial guides (Radar aesthetic) -->
  <g stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.03" fill="none">
    <circle cx="64" cy="64" r="52" />
    <circle cx="64" cy="64" r="40" />
    <circle cx="64" cy="64" r="28" />
    <line x1="12" y1="64" x2="116" y2="64" stroke-dasharray="2 2" />
    <line x1="64" y1="12" x2="64" y2="116" stroke-dasharray="2 2" />
  </g>

  <!-- 3. Glowing neon outer frame border -->
  <rect width="118" height="118" x="5" y="5" rx="30" fill="none" stroke="url(#borderGlow)" stroke-width="1.5" filter="url(#neonGlow)" />

  <!-- 4. Unified "S" Creative Composition -->
  <g filter="url(#shadow)">
    
    <!-- UPPER VIOLET HOOK (Completely open at the end to form a true 'S') -->
    <!-- Base 3D layer -->
    <path d="M 84,36 C 84,24 44,24 44,44 C 44,52 50,58 58,60" 
          fill="none" 
          stroke="url(#violetGrad)" 
          stroke-width="12" 
          stroke-linecap="round" />
    <!-- High-contrast glossy core highlight -->
    <path d="M 81,36 C 81,26 47,26 47,44 C 47,50 51,54 57,56" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-opacity="0.35" 
          stroke-width="3" 
          stroke-linecap="round" />


    <!-- LOWER CYAN HOOK (Completely open at the end to form a true 'S') -->
    <!-- Base 3D layer -->
    <path d="M 44,92 C 44,104 84,104 84,84 C 84,76 78,70 70,68" 
          fill="none" 
          stroke="url(#cyanGrad)" 
          stroke-width="12" 
          stroke-linecap="round" />
    <!-- High-contrast glossy core highlight -->
    <path d="M 47,92 C 47,102 81,102 81,84 C 81,78 77,74 71,72" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-opacity="0.35" 
          stroke-width="3" 
          stroke-linecap="round" />

  </g>

  <!-- 5. Electric Central Zap (Lightning Bolt) - Seamlessly joins the hooks -->
  <g filter="url(#neonGlow)">
    <!-- Glowing outline -->
    <path d="M 78,30 
             L 48,68 
             L 72,68 
             L 44,102 
             L 74,58 
             L 50,58 
             Z" 
          fill="url(#zapBorder)" opacity="0.8" />

    <!-- White-hot core -->
    <path d="M 76,32 
             L 49,66 
             L 70,66 
             L 46,100 
             L 72,60 
             L 52,60 
             Z" 
          fill="url(#zapCore)" />
  </g>

  <!-- 6. Energetic Particle Sparkles -->
  <circle cx="84" cy="36" r="3.5" fill="#FFFFFF" filter="url(#neonGlow)" />
  <circle cx="44" cy="92" r="3.5" fill="#FFFFFF" filter="url(#neonGlow)" />
  <circle cx="64" cy="64" r="1.5" fill="#FFFFFF" />
</svg>
