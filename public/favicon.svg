<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Deep, premium cosmic background gradient -->
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#181924" />
      <stop offset="60%" stop-color="#0E0F16" />
      <stop offset="100%" stop-color="#050609" />
    </radialGradient>

    <!-- Glowing outer border gradient -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E040FF" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#1A1B2F" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.7" />
    </linearGradient>

    <!-- Vibrant 3D Violet-to-Cyan Gradient for the Lightning S -->
    <linearGradient id="lightningSGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3B0FF" />
      <stop offset="30%" stop-color="#E040FF" />
      <stop offset="70%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#0083FF" />
    </linearGradient>

    <!-- White-to-Cyan Electric Core Gradient -->
    <linearGradient id="lightningCoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#DFFFFF" />
      <stop offset="80%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#8A00FF" />
    </linearGradient>

    <!-- Volumetric glow filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft drop shadow for authentic depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Background grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#FFFFFF" stroke-opacity="0.015" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- 1. Obsidian rounded squircle container -->
  <rect width="128" height="128" rx="34" fill="url(#darkBg)" />
  <rect width="128" height="128" rx="34" fill="url(#grid)" />

  <!-- 2. Concentric tech dial guides (Radar aesthetic) -->
  <g stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.03" fill="none">
    <circle cx="64" cy="64" r="52" />
    <circle cx="64" cy="64" r="40" />
    <circle cx="64" cy="64" r="28" />
    <line x1="12" y1="64" x2="116" y2="64" stroke-dasharray="2 2" />
    <line x1="64" y1="12" x2="64" y2="116" stroke-dasharray="2 2" />
  </g>

  <!-- 3. Glowing neon outer frame border -->
  <rect width="118" height="118" x="5" y="5" rx="30" fill="none" stroke="url(#borderGlow)" stroke-width="1.5" filter="url(#neonGlow)" />

  <!-- 4. Pure Lightning Bolt "S" Composition -->
  <g filter="url(#shadow)">
    
    <!-- Outer Glowing Lightning Shape resembling an 'S' -->
    <path d="M 88,26 
             L 38,38 
             L 54,54 
             L 40,66 
             L 86,60 
             L 40,102 
             L 90,90 
             L 74,74 
             L 88,62 
             L 44,68 
             Z" 
          fill="url(#lightningSGrad)" 
          filter="url(#neonGlow)" />

    <!-- Inner White-Hot Core for a futuristic power surge effect -->
    <path d="M 84,28 
             L 42,38 
             L 54,50 
             L 43,62 
             L 82,58 
             L 44,96 
             L 85,86 
             L 72,72 
             L 84,62 
             L 48,67 
             Z" 
          fill="url(#lightningCoreGrad)" />

  </g>

  <!-- 5. Energetic Particle Sparkles -->
  <circle cx="88" cy="26" r="3" fill="#FFFFFF" filter="url(#neonGlow)" />
  <circle cx="40" cy="102" r="3" fill="#00F5FF" filter="url(#neonGlow)" />
  <circle cx="64" cy="64" r="1.5" fill="#FFFFFF" />
</svg>
