<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22232B" />
      <stop offset="60%" stop-color="#141519" />
      <stop offset="100%" stop-color="#0B0C0E" />
    </radialGradient>

    <!-- Glowing Border Gradient -->
    <linearGradient id="glowingBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E040FF" />
      <stop offset="30%" stop-color="#8A00FF" stop-opacity="0.2" />
      <stop offset="70%" stop-color="#00F5FF" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#00F5FF" />
    </linearGradient>

    <!-- Purple/Violet 3D Ribbon Gradients -->
    <linearGradient id="purpleRibbonMain" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#F1A7FF" />
      <stop offset="40%" stop-color="#BD59FF" />
      <stop offset="100%" stop-color="#5500A3" />
    </linearGradient>
    
    <linearGradient id="purpleRibbonShade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DF8FFF" />
      <stop offset="70%" stop-color="#8E24AA" />
      <stop offset="100%" stop-color="#3F0066" />
    </linearGradient>

    <linearGradient id="purpleRibbonShade2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B35DFF" />
      <stop offset="100%" stop-color="#1B003A" />
    </linearGradient>

    <!-- Cyan/Blue 3D Ribbon Gradients -->
    <linearGradient id="cyanRibbonMain" x1="70%" y1="90%" x2="30%" y2="10%">
      <stop offset="0%" stop-color="#E0FFFF" />
      <stop offset="40%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#004D61" />
    </linearGradient>

    <linearGradient id="cyanRibbonShade1" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#80FCFF" />
      <stop offset="70%" stop-color="#00838F" />
      <stop offset="100%" stop-color="#002D33" />
    </linearGradient>

    <linearGradient id="cyanRibbonShade2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#001F3D" />
    </linearGradient>

    <!-- Lightning Bolt Zap Gradient (Vivid Neon Cyan core with white heat) -->
    <linearGradient id="zapCore" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="25%" stop-color="#5BFOFF" />
      <stop offset="75%" stop-color="#00D2FF" />
      <stop offset="100%" stop-color="#D500F9" />
    </linearGradient>

    <linearGradient id="zapBorder" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#7B1FA2" />
    </linearGradient>

    <!-- Filters for authentic volumetric lighting -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Background Grid Pattern -->
    <pattern id="grid" width="6" height="6" patternUnits="userSpaceOnUse">
      <path d="M 6 0 L 0 0 0 6" fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- 1. Metallic squircle container -->
  <rect width="128" height="128" rx="34" fill="url(#bgGlow)" />
  
  <!-- Subtle tech grid pattern overlay -->
  <rect width="128" height="128" rx="34" fill="url(#grid)" />

  <!-- 2. Radar/Concentric dial lines (Matches the image's background details) -->
  <g stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.04" fill="none" class="radar-bg">
    <circle cx="64" cy="64" r="54" />
    <circle cx="64" cy="64" r="42" />
    <circle cx="64" cy="64" r="30" />
    <line x1="10" y1="64" x2="118" y2="64" />
    <line x1="64" y1="10" x2="64" y2="118" />
    <!-- Diagonal guides -->
    <line x1="26" y1="26" x2="102" y2="102" />
    <line x1="26" y1="102" x2="102" y2="26" />
  </g>

  <!-- 3. Outer glowing squircle frame -->
  <rect width="118" height="118" x="5" y="5" rx="30" fill="none" stroke="url(#glowingBorder)" stroke-width="1.5" filter="url(#neonGlow)" opacity="0.85" />

  <!-- 4. Main Elegant S Ribbon Symbol with 3D layers -->
  <g filter="url(#shadow)">
    
    <!-- UPPER VIOLET LOOP -->
    <!-- Layer 1: Back curves of upper S loop -->
    <path d="M 54,44 
             C 42,42 38,34 50,26 
             C 62,18 78,22 84,32 
             C 90,42 86,52 74,56 
             C 68,58 60,60 54,64" 
          fill="none" stroke="url(#purpleRibbonShade1)" stroke-width="15" stroke-linecap="round" />
          
    <!-- Layer 2: Main overlapping dimensional face of upper loop -->
    <path d="M 52,42 
             C 44,40 42,35 52,28 
             C 62,21 75,24 80,32 
             C 85,40 81,48 70,52 
             C 65,54 58,56 52,60" 
          fill="none" stroke="url(#purpleRibbonMain)" stroke-width="11" stroke-linecap="round" />

    <!-- Layer 3: Dynamic inner highlights/folds -->
    <path d="M 56,38 
             C 50,37 50,34 56,31 
             C 62,28 71,30 74,35" 
          fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2.5" stroke-linecap="round" />


    <!-- LOWER CYAN/BLUE LOOP -->
    <!-- Layer 1: Back curves of lower S loop -->
    <path d="M 74,84 
             C 86,86 90,94 78,102 
             C 66,110 50,106 44,96 
             C 38,86 42,76 54,72 
             C 60,70 68,68 74,64" 
          fill="none" stroke="url(#cyanRibbonShade1)" stroke-width="15" stroke-linecap="round" />

    <!-- Layer 2: Main overlapping dimensional face of lower loop -->
    <path d="M 76,86 
             C 84,88 86,93 76,100 
             C 66,107 53,104 48,96 
             C 43,88 47,80 58,76 
             C 63,74 70,72 76,68" 
          fill="none" stroke="url(#cyanRibbonMain)" stroke-width="11" stroke-linecap="round" />

    <!-- Layer 3: Dynamic inner highlights/folds -->
    <path d="M 72,90 
             C 78,91 78,94 72,97 
             C 66,100 57,98 54,93" 
          fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2.5" stroke-linecap="round" />

  </g>

  <!-- 5. Electric Glowing Zap Lightning Bolt cutting through the center -->
  <g filter="url(#neonGlow)">
    <!-- Main outer outline / shadow layer of lightning bolt -->
    <path d="M 83,21
             L 45,77 
             L 77,77 
             L 39,121 
             L 67,65 
             L 49,65 
             Z" 
          fill="url(#zapBorder)" opacity="0.9" />

    <!-- White-hot inner core of lightning bolt -->
    <path d="M 82,23
             L 46,76 
             L 75,76 
             L 41,119 
             L 66,66 
             L 51,66 
             Z" 
          fill="url(#zapCore)" />
  </g>

  <!-- 6. Energetic particle sparkles (Matches the glowing dots from reference image) -->
  <circle cx="83" cy="40" r="3" fill="#FFFFFF" filter="url(#neonGlow)" />
  <circle cx="45" cy="88" r="2.5" fill="#FFFFFF" filter="url(#neonGlow)" />
  <circle cx="64" cy="64" r="1.5" fill="#FFFFFF" />
</svg>
