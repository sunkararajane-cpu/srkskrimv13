<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Deep premium dark cosmic background -->
    <radialGradient id="darkBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#181924" />
      <stop offset="60%" stop-color="#0E0F16" />
      <stop offset="100%" stop-color="#050609" />
    </radialGradient>

    <!-- Glowing squircle border gradient -->
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E040FF" stop-opacity="0.7" />
      <stop offset="50%" stop-color="#1A1B2F" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#00F5FF" stop-opacity="0.7" />
    </linearGradient>

    <!-- Lightning Bolt Vibrant Neon cyan/violet edge gradient -->
    <linearGradient id="zapBorder" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F5FF" />
      <stop offset="100%" stop-color="#E040FF" />
    </linearGradient>

    <!-- Lightning Bolt White-hot glowing inner core gradient -->
    <linearGradient id="zapCore" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#9FFFFF" />
      <stop offset="70%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#7B1FA2" />
    </linearGradient>

    <!-- High-quality volumetric neon glow filter -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft drop shadow for authentic dimensional depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Delicate background grid pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#FFFFFF" stroke-opacity="0.015" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- 1. Obsidian rounded squircle container -->
  <rect width="128" height="128" rx="34" fill="url(#darkBg)" />
  <rect width="128" height="128" rx="34" fill="url(#grid)" />

  <!-- 2. Concentric tech dial guides (Radar / Blueprint aesthetic from the reference) -->
  <g stroke="#FFFFFF" stroke-width="0.75" stroke-opacity="0.03" fill="none">
    <circle cx="64" cy="64" r="52" />
    <circle cx="64" cy="64" r="40" />
    <circle cx="64" cy="64" r="28" />
    <line x1="12" y1="64" x2="116" y2="64" stroke-dasharray="2 2" />
    <line x1="64" y1="12" x2="64" y2="116" stroke-dasharray="2 2" />
  </g>

  <!-- 3. Glowing neon outer frame border -->
  <rect width="118" height="118" x="5" y="5" rx="30" fill="none" stroke="url(#borderGlow)" stroke-width="1.5" filter="url(#neonGlow)" />

  <!-- 4. Simple, Clean, and Powerful Electric Lightning Bolt -->
  <g filter="url(#shadow)">
    <!-- Main outer glowing body layer -->
    <path d="M 78,30 
             L 48,68 
             L 72,68 
             L 44,102 
             L 74,58 
             L 50,58 
             Z" 
          fill="url(#zapBorder)" 
          filter="url(#neonGlow)" />

    <!-- White-hot high-contrast inner core layer -->
    <path d="M 76,32 
             L 49,66 
             L 70,66 
             L 46,100 
             L 72,60 
             L 52,60 
             Z" 
          fill="url(#zapCore)" />
  </g>

  <!-- 5. Energetic Particle Sparkles (glowing dots matching the reference) -->
  <circle cx="84" cy="36" r="3.5" fill="#FFFFFF" filter="url(#neonGlow)" />
  <circle cx="44" cy="92" r="3.5" fill="#00F5FF" filter="url(#neonGlow)" />
  <circle cx="64" cy="64" r="1.5" fill="#FFFFFF" />
</svg>
