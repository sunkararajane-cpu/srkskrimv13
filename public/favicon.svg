<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="skrimGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B026FF" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Obsidian Dark rounded background -->
  <rect width="128" height="128" rx="32" fill="#09090D" />
  
  <!-- Glowing neon border frame -->
  <rect width="120" height="120" x="4" y="4" rx="28" fill="none" stroke="url(#skrimGradient)" stroke-width="2.5" stroke-opacity="0.3" />
  
  <!-- Subtle inner background grid line effect -->
  <path d="M 4 32 L 124 32 M 4 64 L 124 64 M 4 96 L 124 96 M 32 4 L 32 124 M 64 4 L 64 124 M 96 4 L 96 124" stroke="white" stroke-opacity="0.02" stroke-width="1" />

  <!-- The "S" and conversation balloon integrated emblem -->
  <g filter="url(#glow)">
    <!-- Main emblem path -->
    <path d="M 36,44 
             C 36,32 52,26 64,26 
             C 78,26 88,34 88,44 
             C 88,54 74,58 70,62 
             C 66,66 66,74 78,74 
             C 86,74 92,68 92,68 
             L 88,80 
             C 88,80 80,86 64,86 
             C 48,86 40,76 40,66 
             C 40,52 58,48 62,44 
             C 66,40 62,36 54,36 
             C 46,36 40,42 40,42 
             Z" 
          fill="url(#skrimGradient)" />

    <!-- Sleek chat tail element -->
    <path d="M 40,66 L 30,76 L 46,74 Z" fill="url(#skrimGradient)" />

    <!-- Floating energy dot indicator -->
    <circle cx="88" cy="34" r="5" fill="#00F0FF" />
  </g>
</svg>
